services:
  db:
    image: postgres:16-alpine
    container_name: docdiff-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: docdiff
      POSTGRES_USER: docdiff
      POSTGRES_PASSWORD: "D0cDiff!2026@K7m#R9xP4"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docdiff -d docdiff"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: 210.99.214.195:5000/docdiff-backend:latest
    container_name: docdiff-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+psycopg://docdiff:D0cDiff%212026%40K7m%23R9xP4@db:5432/docdiff"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      CORS_ORIGINS: http://210.99.214.195:5173,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: 210.99.214.195:5000/docdiff-frontend:latest
    container_name: docdiff-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: https://diff.xn----qd6ew2cx70c6uae40epc.com/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
